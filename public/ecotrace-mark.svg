<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="EcoTrace">
  <defs>
    <linearGradient id="eco-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="0.55" stop-color="#16a34a"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
  </defs>
  <rect x="3" y="3" width="58" height="58" rx="17" fill="url(#eco-grad)"/>
  <!-- rising, downward-trending footprint line (a falling-then-rising eco trend) -->
  <path d="M16 44 L27 33 L35 41 L48 19"
        fill="none" stroke="#ffffff" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- arrow head signalling upward progress -->
  <path d="M40 18 L50 18 L50 28"
        fill="none" stroke="#ffffff" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
